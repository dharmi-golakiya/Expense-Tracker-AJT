<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expense Tracker - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* Adjusted Colors for Higher Contrast */
        :root {
            --bg-main: #0f172a; /* Darker slate background */
            --bg-card: #1e293b; /* Lighter, distinct card background */
            --bg-input: #334155; /* Input field background */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-primary: #3b82f6; 
            --accent-hover: #2563eb;
        }

        body {
            height: 100vh;
            display: flex;
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow: hidden; /* Prevents scrollbars from the overlapping wave */
        }

        /* LEFT SIDE (Background Section) */
        .left-side {
            width: 55%; /* Increased width to allow for overlap */
            background: linear-gradient(145deg, #0f172a, #1e3a8a);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
            text-align: center;
            z-index: 2; /* Ensures content stays above background */
        }

        /* --- NEW: The Overlapping Wave Effect --- */
        .wave-divider {
            position: absolute;
            top: 0;
            right: -1px; /* -1px fixes any tiny rendering gaps */
            width: 150px;
            height: 100%;
            pointer-events: none;
            z-index: 3;
        }
        
        .wave-divider svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .wave-divider path {
            fill: var(--bg-main); /* This matches the RIGHT side background color */
        }

        /* CSS-only decorative chart graphic */
        .chart-graphic {
            display: flex;
            align-items: flex-end;
            gap: 15px;
            height: 120px;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 4; /* Ensures chart is above the wave if screen is small */
        }

        .bar {
            width: 30px;
            border-radius: 5px 5px 0 0;
            background: linear-gradient(to top, #3b82f6, #60a5fa);
            animation: grow 1.5s ease-out forwards;
            transform-origin: bottom;
            opacity: 0;
        }

        .bar:nth-child(1) { height: 40%; animation-delay: 0.2s; }
        .bar:nth-child(2) { height: 70%; animation-delay: 0.4s; }
        .bar:nth-child(3) { height: 50%; animation-delay: 0.6s; }
        .bar:nth-child(4) { height: 100%; animation-delay: 0.8s; background: linear-gradient(to top, #10b981, #34d399); }

        @keyframes grow {
            0% { transform: scaleY(0); opacity: 0; }
            100% { transform: scaleY(1); opacity: 1; }
        }

        .left-side h1 {
            font-size: 42px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #ffffff;
            position: relative;
            z-index: 4;
        }

        .left-side p {
            font-size: 16px;
            max-width: 400px;
            color: #bfdbfe;
            line-height: 1.6;
            font-weight: 300;
            position: relative;
            z-index: 4;
        }

        /* RIGHT SIDE (Login Section) */
        .right-side {
            width: 45%; /* Decreased width to compensate for left overlap */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        /* Login Card */
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 45px 40px;
            border-radius: 16px;
            background: var(--bg-card);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15); 
            z-index: 5;
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 26px;
            color: var(--text-main);
        }

        .login-card p.subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Input Group */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-input);
            border: 1px solid #475569;
            border-radius: 8px;
            outline: none;
            color: var(--text-main);
            font-size: 14px;
            transition: 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .input-group label {
            position: absolute;
            left: 14px;
            top: 14px;
            background: transparent;
            color: var(--text-muted);
            font-size: 14px;
            transition: 0.3s ease;
            pointer-events: none;
        }

        /* Floating Label Animation */
        .input-group input:focus + label,
        .input-group input:valid + label {
            top: -10px;
            left: 10px;
            font-size: 12px;
            color: var(--accent-primary);
            background: var(--bg-card); 
            padding: 0 5px;
            font-weight: 500;
        }

        /* Form Utilities */
        .form-utilities {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            accent-color: var(--accent-primary);
            width: 15px;
            height: 15px;
            cursor: pointer;
        }

        .forgot-password {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        /* Buttons */
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: var(--accent-primary);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        /* Google Button */
        .google-btn {
            background: var(--bg-input);
            color: var(--text-main);
            border: 1px solid #475569;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .google-btn:hover {
            background: #475569;
            transform: none;
        }

        .google-btn img {
            width: 18px;
        }

        /* Divider */
        .divider {
            text-align: center;
            margin: 20px 0;
            color: #64748b;
            font-size: 12px;
            display: flex;
            align-items: center;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #475569;
        }

        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }

        /* Signup */
        .signup {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 25px;
        }

        .signup a {
            color: var(--accent-primary);
            font-weight: 500;
            text-decoration: none;
        }

        .signup a:hover {
            text-decoration: underline;
        }

        .secure-badge {
            text-align: center;
            font-size: 11px;
            color: #64748b;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        /* Mobile Responsiveness */
        @media (max-width: 900px) {
            body { flex-direction: column; overflow-y: auto; }
            .left-side {
                width: 100%;
                height: auto;
                padding: 40px 20px;
            }
            .wave-divider { display: none; } /* Hide the wave on mobile */
            .chart-graphic { display: none; }
            .right-side {
                width: 100%;
                padding: 40px 20px;
                background: var(--bg-main);
            }
            .login-card { 
                padding: 30px; 
            }
        }
    </style>
</head>

<body>

<div class="left-side">

    <div class="wave-divider">
        <svg viewBox="0 0 100 100" preserveAspectRatio="none">
             <path d="M 100 0 C -20 40, 60 70, 0 100 L 100 100 Z" />
        </svg>
    </div>

    <div class="chart-graphic">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>
    
    <h1>Expense Tracker</h1>
    <p>
        Manage your daily expenses, track your spending habits,
        and control your finances easily with our smart dashboard.
    </p>
</div>

<div class="right-side">
    <div class="login-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Enter your credentials to access your account</p>

        <form action="LoginServlet" method="post">
            <div class="input-group">
                <input type="email" name="email" required>
                <label>Email Address</label>
            </div>

            <div class="input-group">
                <input type="password" name="password" required>
                <label>Password</label>
            </div>

            <div class="form-utilities">
                <label class="remember-me">
                    <input type="checkbox" name="remember">
                    Remember me
                </label>
               
            </div>

            <button type="submit">Login</button>
        </form>

        

        <div class="signup">
            New User? <a href="register.jsp">Create Account</a>
        </div>
        
        <div class="secure-badge">
            &#128274; Secure 256-bit Encryption
        </div>
    </div>
</div>

</body>
</html>
